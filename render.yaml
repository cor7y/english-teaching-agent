services:
  - type: web
    name: eta
    runtime: python
    buildCommand: pip install uv && uv sync --frozen
    startCommand: .venv/bin/python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ACCESS_TOKEN
        sync: false
